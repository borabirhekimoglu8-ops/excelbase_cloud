name: Excelbase V8 CI

on:
  push:
    paths:
      - "v8/**"
      - ".github/workflows/v8-ci.yml"
  pull_request:
    paths:
      - "v8/**"
      - ".github/workflows/v8-ci.yml"

permissions:
  contents: read

# Test-only keys; never reuse outside CI.
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        database: [sqlite, postgres]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: excelbase_v8_ci
          POSTGRES_USER: excelbase
          POSTGRES_PASSWORD: ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U excelbase -d excelbase_v8_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    defaults:
      run:
        working-directory: v8
    env:
      V8_APP_ENV: test
      V8_DATABASE_URL: ${{ matrix.database == 'postgres' && 'postgresql+pg8000://excelbase:ci-password@localhost:5432/excelbase_v8_ci' || 'sqlite:///./ci-v8.db' }}
      V8_ALLOW_DEV_IDENTITY: "1"
      V8_AUTO_CREATE_SCHEMA: "0"
      V8_FIELD_ENCRYPTION_KEY: VnnOE-2sAytxd3h6MM9KWtX32DCXJRkJx_uzoIyWnzY=
      V8_PASSPORT_HMAC_KEY: ci-passport-hmac-key-that-is-definitely-longer-than-32-bytes
      V8_JWT_SECRET: ci-jwt-secret-used-only-in-this-workflow
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: v8/pyproject.toml
      - name: Install
        run: python -m pip install -e '.[dev,postgres]'
      - name: Lint
        run: ruff check app tests scripts
      - name: Migration smoke test (upgrade, downgrade, re-upgrade)
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head
      - name: Test
        run: python -m pytest
