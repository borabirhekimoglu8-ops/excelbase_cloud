name: Excelbase V8 CI

on:
  push:
    paths:
      - "v8/**"
      - ".github/workflows/v8-ci.yml"
      - "frontend/src/lib/api-v8.ts"
      - "frontend/src/app/v8/**"
      - "frontend/src/components/v8/**"
      - "frontend/e2e/**"
      - "frontend/playwright.config.ts"
  pull_request:
    paths:
      - "v8/**"
      - ".github/workflows/v8-ci.yml"
      - "frontend/src/lib/api-v8.ts"
      - "frontend/src/app/v8/**"
      - "frontend/src/components/v8/**"
      - "frontend/e2e/**"
      - "frontend/playwright.config.ts"

permissions:
  contents: read

# Test-only keys; never reuse outside CI.
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        database: [sqlite, postgres]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: excelbase_v8_ci
          POSTGRES_USER: excelbase
          POSTGRES_PASSWORD: ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U excelbase -d excelbase_v8_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    defaults:
      run:
        working-directory: v8
    env:
      V8_APP_ENV: test
      V8_DATABASE_URL: ${{ matrix.database == 'postgres' && 'postgresql+pg8000://excelbase:ci-password@localhost:5432/excelbase_v8_ci' || 'sqlite:///./ci-v8.db' }}
      V8_ALLOW_DEV_IDENTITY: "1"
      V8_AUTO_CREATE_SCHEMA: "0"
      V8_FIELD_ENCRYPTION_KEY: VnnOE-2sAytxd3h6MM9KWtX32DCXJRkJx_uzoIyWnzY=
      V8_PASSPORT_HMAC_KEY: ci-passport-hmac-key-that-is-definitely-longer-than-32-bytes
      V8_JWT_SECRET: ci-jwt-secret-used-only-in-this-workflow
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: v8/pyproject.toml
      - name: Install
        run: python -m pip install -e '.[dev,postgres]'
      - name: Lint
        run: ruff check app tests scripts
      - name: Migration smoke test (upgrade, downgrade, re-upgrade)
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head
      - name: Test
        run: python -m pytest

  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Build V8 pilot
        env:
          NEXT_PUBLIC_V8_API_URL: http://localhost:8080
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: v8/pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend
        working-directory: v8
        run: python -m pip install -e '.[dev]'
      - name: Start V8 API
        working-directory: v8
        env:
          V8_APP_ENV: test
          V8_DATABASE_URL: sqlite:///./e2e-v8.db
          V8_ALLOW_DEV_IDENTITY: "1"
          V8_AUTO_CREATE_SCHEMA: "0"
          V8_FIELD_ENCRYPTION_KEY: VnnOE-2sAytxd3h6MM9KWtX32DCXJRkJx_uzoIyWnzY=
          V8_PASSPORT_HMAC_KEY: ci-passport-hmac-key-that-is-definitely-longer-than-32-bytes
          V8_ALLOWED_ORIGINS: http://localhost:3000
        run: |
          alembic upgrade head
          BOOTSTRAP=$(python scripts/bootstrap.py \
            --organization "E2E Ops" --slug e2e-ops \
            --email e2e@example.com --display-name "E2E Owner")
          echo "$BOOTSTRAP"
          echo "V8_E2E_ORG_ID=$(echo "$BOOTSTRAP" | sed -n 's/^organization_id=//p')" >> "$GITHUB_ENV"
          echo "V8_E2E_USER_ID=$(echo "$BOOTSTRAP" | sed -n 's/^user_id=//p')" >> "$GITHUB_ENV"
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8080 > uvicorn.log 2>&1 &
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8080/api/v8/health && break
            sleep 1
          done
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_V8_API_URL: http://localhost:8080
        run: npm run build
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run Playwright smoke test
        working-directory: frontend
        env:
          NEXT_PUBLIC_V8_API_URL: http://localhost:8080
        run: npx playwright test
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
