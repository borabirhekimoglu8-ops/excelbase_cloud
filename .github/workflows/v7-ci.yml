name: Gate Visa V7.1 CI

on:
  push:
    paths:
      - "backend/**"
      - "frontend/**"
      - "tests/**"
      - "*.py"
      - "requirements.txt"
      - "Dockerfile"
      - "render.yaml"
      - ".github/workflows/v7-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "tests/**"
      - "*.py"
      - "requirements.txt"
      - "Dockerfile"
      - "render.yaml"
      - ".github/workflows/v7-ci.yml"

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            backend/requirements.txt
      - name: Install
        run: python -m pip install -r backend/requirements.txt pytest httpx
      - name: Compile
        run: python -m py_compile backend/*.py db.py persistence.py passenger_schema.py photo_store.py
      - name: Test V7.1
        env:
          GATEVISA_REQUIRE_AUTH: "1"
        run: python -m pytest -q tests

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Production build
        run: npm run build
