databases:
  # V8 üretim veritabanı. Şema yalnızca Alembic ile yönetilir
  # (container açılışında `alembic upgrade head` çalışır).
  - name: excelbase-v8-db
    plan: free
    databaseName: excelbase_v8
    user: excelbase

services:
  # V7 — tek servis: FastAPI backend + Next.js PWA (Streamlit'in tüm
  # fonksiyonları buraya taşındı). Docker imajı frontend'i build edip
  # FastAPI üzerinden statik olarak sunar.
  - type: web
    name: excelbase
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: GATEVISA_REQUIRE_AUTH
        value: "1"
      # Render'ın kendi Postgres'i (excelbase-v8-db) free plan'da 30 gün sonra
      # otomatik silinir. Ücretsiz kalıcı bir alternatif için (ör. Neon/
      # Supabase) bağlantı dizesini burada değil, Render Dashboard →
      # excelbase → Environment sekmesinde DATABASE_URL olarak elle girin
      # (postgresql://... formatı; db.py hem pg8000 sürücüsünü hem TLS'i
      # otomatik ayarlar, kod tarafında ek değişiklik gerekmez).
      - key: DATABASE_URL
        sync: false
      - key: GATEVISA_DATA_SECRET
        generateValue: true
      # /v8 sayfasının varsayılan API adresi (build sırasında gömülür).
      # Boş bırakılırsa /v8 sayfasındaki "API adresi" alanından da girilebilir.
      - key: NEXT_PUBLIC_V8_API_URL
        value: https://excelbase-v8.onrender.com

  # V8 — ilişkisel çekirdek API'si. Gizli anahtarlar Render tarafından
  # otomatik üretilir (generateValue) ve asla repoya yazılmaz.
  - type: web
    name: excelbase-v8
    env: docker
    plan: free
    dockerfilePath: ./v8/Dockerfile
    healthCheckPath: /api/v8/health
    envVars:
      - key: V8_APP_ENV
        value: production
      - key: V8_DATABASE_URL
        fromDatabase:
          name: excelbase-v8-db
          property: connectionString
      - key: V8_ALLOW_DEV_IDENTITY
        value: "0"
      - key: V8_AUTO_CREATE_SCHEMA
        value: "0"
      # Rotasyon gerektiğinde V8_FIELD_ENCRYPTION_KEYS ("keyid:anahtar,...")
      # değişkeni bu tekil anahtarın yerine geçer.
      - key: V8_FIELD_ENCRYPTION_KEY
        generateValue: true
      - key: V8_PASSPORT_HMAC_KEY
        generateValue: true
      - key: V8_JWT_SECRET
        generateValue: true
      - key: V8_JWT_ISSUER
        value: excelbase-v8
      - key: V8_JWT_AUDIENCE
        value: excelbase-v8
      - key: V8_ALLOWED_ORIGINS
        value: https://excelbase.onrender.com
      # Açılışta ilk organizasyon + sahip kullanıcıyı otomatik oluşturur ve
      # giriş JWT'sini servis loglarına yazar (idempotent; her açılışta güvenli).
      - key: V8_BOOTSTRAP_ORGANIZATION
        value: Excelbase
      - key: V8_BOOTSTRAP_SLUG
        value: excelbase
      - key: V8_BOOTSTRAP_EMAIL
        sync: false
      - key: V8_BOOTSTRAP_DISPLAY_NAME
        sync: false
      # Başlangıçta yerel disk (ücretsiz planda kalıcı değildir; yeniden
      # deploy'da fotoğraflar silinir). Kalıcı fotoğraf için S3/R2'ye geçin:
      # V8_STORAGE_BACKEND=s3 + V8_S3_BUCKET/V8_S3_REGION/V8_S3_ENDPOINT_URL
      # + AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY değişkenlerini ekleyin.
      - key: V8_STORAGE_BACKEND
        value: local
      - key: V8_STORAGE_LOCAL_ROOT
        value: /tmp/excelbase-objects
