name: ExcelbaseOffline

options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: tr

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    CLANG_ENABLE_MODULES: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    exactVersion: 7.11.1

targets:
  ExcelbaseOffline:
    type: application
    platform: iOS
    sources:
      - path: ExcelbaseOffline
        excludes:
          - "Resources/**"
      - path: ExcelbaseOffline/Resources/Assets.xcassets
        buildPhase: resources
      - path: Generated
        excludes:
          - "**/*.xcframework/**"
          - "**/*.h"
          - "**/*.modulemap"
    info:
      path: ExcelbaseOffline/Resources/Info.plist
    entitlements:
      path: ExcelbaseOffline/Resources/ExcelbaseOffline.entitlements
    dependencies:
      - package: GRDB
        product: GRDB
      - framework: Generated/ExcelbaseCore.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.excelbase.offline
        PRODUCT_NAME: Excelbase
        PRODUCT_MODULE_NAME: ExcelbaseOffline
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Excelbase
        CODE_SIGN_ENTITLEMENTS: ExcelbaseOffline/Resources/ExcelbaseOffline.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
        DEAD_CODE_STRIPPING: YES

  ExcelbaseOfflineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ExcelbaseOfflineTests
    dependencies:
      - target: ExcelbaseOffline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.excelbase.offline.tests
        PRODUCT_NAME: ExcelbaseOfflineTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Excelbase.app/Excelbase"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  ExcelbaseOffline:
    build:
      targets:
        ExcelbaseOffline: all
        ExcelbaseOfflineTests: [test]
    test:
      config: Debug
      targets:
        - ExcelbaseOfflineTests
    run:
      config: Debug
    archive:
      config: Release
