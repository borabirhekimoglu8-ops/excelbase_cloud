[server]
maxUploadSize = 200
enableXsrfProtection = true
enableStaticServing = true

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#2563EB"
backgroundColor = "#F5F7FB"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#1B2433"
font = "sans serif"

[client]
toolbarMode = "minimal"
