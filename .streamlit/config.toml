[server]
maxUploadSize = 200
enableXsrfProtection = true
enableStaticServing = true

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#F5C451"
backgroundColor = "#070B16"
secondaryBackgroundColor = "#111A2E"
textColor = "#EAF0FB"
font = "sans serif"

[client]
toolbarMode = "minimal"
